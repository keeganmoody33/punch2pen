name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  engine-tests:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build -DPUNCH2PEN_BUILD_PLUGIN=OFF
      - name: Build test targets
        run: cmake --build build --target databaseManagerTest profileManagerTest protocolSerializationTest openAIJsonTest transcriptionCoordinatorTest -j4
      - name: Run tests
        run: |
          ./build/bin/databaseManagerTest
          ./build/bin/profileManagerTest
          ./build/bin/protocolSerializationTest
          ./build/bin/openAIJsonTest
          ./build/bin/transcriptionCoordinatorTest

  plugin-tests:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure with plugin
        run: cmake -S . -B build -DPUNCH2PEN_BUILD_PLUGIN=ON
      - name: Build plugin test targets
        run: cmake --build build --target ringBufferTest ipcClientTest -j4
      - name: Run plugin tests
        run: |
          ./build/plugin/ringBufferTest_artefacts/Release/ringBufferTest
          ./build/plugin/ipcClientTest_artefacts/Release/ipcClientTest
